<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CodeRefine AI</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
}

.container{
width:75%;
max-width:950px;
margin:40px 0;
}

.title{
text-align:center;
font-size:34px;
font-weight:700;
margin-bottom:40px;
}

.section-title{
font-size:20px;
margin-bottom:10px;
font-weight:600;
}

textarea{
width:100%;
height:180px;
background:#0f172a;
border:1px solid #334155;
border-radius:12px;
color:white;
padding:15px;
font-size:15px;
resize:none;
}

.small-box{
height:110px;
margin-top:15px;
}

button{
width:100%;
margin:30px 0;
padding:16px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:600;
background:linear-gradient(90deg,#38bdf8,#22d3ee);
color:black;
cursor:pointer;
}

.output{
margin-top:20px;
background:#0f172a;
padding:25px;
border-radius:14px;
font-size:16px;
line-height:1.7;
}

.heading{
margin-top:30px;
font-size:20px;
font-weight:600;
color:#7dd3fc;
display:flex;
align-items:center;
gap:12px;
}

.badge{
width:28px;
height:28px;
border-radius:50%;
background:#38bdf8;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
font-weight:700;
}

.code-block{
background:#020617;
padding:18px;
border-radius:12px;
font-family:monospace;
font-size:14px;
margin-top:15px;
white-space:pre-wrap;
overflow-x:auto;
}

.error-box{
background:#7f1d1d;
padding:14px;
border-radius:10px;
color:#fecaca;
font-weight:600;
}

.point{
margin-left:15px;
margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🚀 CodeRefine AI</div>

<div class="section-title">💻 Source Code</div>
<textarea id="codeInput" placeholder="Paste your code here..."></textarea>

<div class="section-title" style="margin-top:30px;">🧠 CodeMorph Engine (Optional)</div>
<textarea id="instruction" class="small-box" placeholder="convert to java, optimize, secure, clean code..."></textarea>

<button onclick="runAnalyze()">⚡ Run & Analyze</button>

<div class="section-title">📊 Analysis Output</div>
<div id="resultBox" class="output"></div>

</div>

<script>

function cleanMarkdown(text){
return text
.replace(/###/g,"")
.replace(/\*\*\*/g,"")
.replace(/---/g,"")
.replace(/```([\s\S]*?)```/g,function(match,code){
return '<div class="code-block">'+code.trim()+'</div>';
});
}

function styleHeadings(text){

let sections=[
"Run Explanation",
"Professional Code Review",
"Bugs",
"Improvements",
"Performance",
"Security",
"Clean Improved Code"
];

sections.forEach((title,index)=>{
let regex=new RegExp(title,"g");
text=text.replace(regex,
'<div class="heading"><span class="badge">'+(index+1)+'</span>'+title+'</div>');
});

return text;
}

function convertBullets(text){

let sections=text.split('<div class="heading"');
let final="";

sections.forEach((section,index)=>{

if(index===0){
final+=section;
return;
}

let parts=section.split('</div>');
let heading=parts[0];
let content=parts[1] || "";

let lines=content.split("\n");
let count=1;

lines=lines.map(line=>{
if(line.trim().startsWith("-")){
let cleaned=line.replace("-","").trim();
return '<div class="point">'+count+++". "+cleaned+'</div>';
}
return line;
});

final+='<div class="heading"'+heading+'</div>'+lines.join("\n");
});

return final;
}

async function runAnalyze(){

const code=document.getElementById("codeInput").value;
const instruction=document.getElementById("instruction").value;
const resultBox=document.getElementById("resultBox");

if(!code.trim()){
resultBox.innerHTML='<div class="error-box">Please enter source code.</div>';
return;
}

resultBox.innerHTML="Processing...";

try{
const response=await fetch("https://coderefine-ai-eng8.onrender.com/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code:code,instruction:instruction})
});

const data=await response.json();

let output=cleanMarkdown(data.output);
output=styleHeadings(output);
output=convertBullets(output);

resultBox.innerHTML=output;

}catch(error){
resultBox.innerHTML='<div class="error-box">Backend connection error.</div>';
}

}

</script>

</body>
</html>
